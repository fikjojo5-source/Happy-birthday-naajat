<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Cake - Happy Birthday Najat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .message-enter {
      animation: fadeIn 0.6s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    #blowCandlesBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>🎂 Birthday Cake</h1>
    <h2 aria-label="Three candles">🕯️🕯️🕯️</h2>
    
    <p>Make a wish NAJAT ❤️</p>
    
    <button 
      id="blowCandlesBtn" 
      aria-label="Blow out the candles and reveal birthday message">
      Blow Candles 🎉
    </button>
    
    <h2 
      id="message" 
      aria-live="polite" 
      aria-label="Birthday message" 
      role="status">
    </h2>
    
    <br>
    
    <a href="questions.html">
      <button aria-label="Continue to next page">Continue 💕</button>
    </a>
  </main>

  <script>
    const blowButton = document.getElementById('blowCandlesBtn');
    const messageEl = document.getElementById('message');
    
    blowButton.addEventListener('click', function() {
      messageEl.textContent = '🎊 Happy Birthday Princess NAJAT 🎊';
      messageEl.classList.add('message-enter');
      blowButton.disabled = true;
    });
  </script>
</body>
</html>
